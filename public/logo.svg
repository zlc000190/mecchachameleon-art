<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Meccha Chameleon Art Lab">
  <title>Meccha Chameleon Art Lab</title>
  <defs>
    <!-- Slight vertical gradient on the chameleon body for depth -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a8a6b"/>
      <stop offset="1" stop-color="#1a5a47"/>
    </linearGradient>
    <linearGradient id="bodyShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a5a47" stop-opacity="0"/>
      <stop offset="1" stop-color="#0a2e23" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="1" stop-color="#0e0e0e"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Branch (chameleon is curled around it) -->
  <path d="M 200 760 Q 380 720 512 740 T 870 700"
        stroke="#5d3a23" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M 200 760 Q 380 720 512 740 T 870 700"
        stroke="#3a2415" stroke-width="22" stroke-linecap="round" fill="none"
        stroke-dasharray="0 60 30 0" opacity="0.4"/>

  <!-- Tiny leaf on the branch -->
  <path d="M 760 706 Q 800 670 836 686 Q 820 716 776 720 Z" fill="#3d6b3d"/>
  <path d="M 760 706 Q 800 670 836 686" stroke="#1f3d20" stroke-width="3" fill="none"/>

  <!-- Curled chameleon tail (wraps under the body) -->
  <path d="M 268 690
           C 200 600, 220 460, 320 420
           C 410 388, 470 470, 430 530
           C 396 580, 430 614, 488 600"
        stroke="url(#bodyGrad)" stroke-width="68" stroke-linecap="round" fill="none"/>
  <path d="M 268 690
           C 200 600, 220 460, 320 420
           C 410 388, 470 470, 430 530
           C 396 580, 430 614, 488 600"
        stroke="url(#bodyShadow)" stroke-width="68" stroke-linecap="round" fill="none"/>

  <!-- Body (oval) -->
  <ellipse cx="540" cy="555" rx="170" ry="135" fill="url(#bodyGrad)"/>
  <ellipse cx="540" cy="555" rx="170" ry="135" fill="url(#bodyShadow)"/>

  <!-- Belly highlight -->
  <ellipse cx="540" cy="595" rx="118" ry="62" fill="#3aaa83" opacity="0.55"/>

  <!-- Camouflage splotches on body -->
  <ellipse cx="478" cy="498" rx="34" ry="26" fill="#c66b3d" opacity="0.85"/>
  <ellipse cx="588" cy="540" rx="38" ry="30" fill="#f6f3ea" opacity="0.55"/>
  <ellipse cx="510" cy="600" rx="28" ry="20" fill="#1f4733" opacity="0.7"/>
  <ellipse cx="600" cy="478" rx="22" ry="18" fill="#f6f3ea" opacity="0.45"/>

  <!-- Head crest (small triangular spikes) -->
  <path d="M 612 444 L 624 416 L 636 444 Z" fill="#1a5a47"/>
  <path d="M 636 436 L 652 408 L 660 438 Z" fill="#1a5a47"/>
  <path d="M 660 434 L 678 410 L 686 440 Z" fill="#1a5a47"/>

  <!-- Head (rounded triangular shape pointing right) -->
  <path d="M 620 470
           Q 760 470, 800 510
           Q 760 570, 620 580
           Q 600 525, 620 470 Z"
        fill="url(#bodyGrad)"/>
  <path d="M 620 470
           Q 760 470, 800 510
           Q 760 570, 620 580
           Q 600 525, 620 470 Z"
        fill="url(#bodyShadow)" opacity="0.6"/>

  <!-- Eye socket (large dark ring) -->
  <circle cx="730" cy="500" r="46" fill="#0e0e0e"/>
  <circle cx="730" cy="500" r="38" fill="#f6f3ea"/>
  <!-- Pupil (a tiny chameleon-style pinpoint) -->
  <circle cx="730" cy="500" r="9" fill="#0e0e0e"/>
  <!-- Eye highlight -->
  <circle cx="722" cy="492" r="6" fill="#f6f3ea"/>

  <!-- Mouth (curved smile) -->
  <path d="M 790 532 Q 808 542 798 552" stroke="#0e0e0e" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Front foot gripping branch -->
  <path d="M 600 670 Q 590 700 612 716 L 624 706 L 624 686 Q 616 670 600 670 Z" fill="#1a5a47"/>
  <path d="M 600 670 Q 590 700 612 716" stroke="#0a2e23" stroke-width="3" fill="none"/>
  <!-- Back foot -->
  <path d="M 430 680 Q 420 710 442 726 L 454 716 L 454 696 Q 446 680 430 680 Z" fill="#1a5a47"/>

  <!-- Monogram "M" in the negative space under the body, terracotta accent -->
  <text x="512" y="890"
        font-family="ui-sans-serif, -apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif"
        font-size="120"
        font-weight="800"
        letter-spacing="14"
        text-anchor="middle"
        fill="#c66b3d">MECHA</text>
</svg>
