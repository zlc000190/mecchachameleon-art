<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meccha Chameleon Hide and Seek</title>
    <style>
      html,
      body,
      iframe {
        width: 100%;
        height: 100%;
        margin: 0;
        border: 0;
        background: #1f1230;
      }

      body {
        overflow: hidden;
      }
    </style>
    <script src="/vendor/x-frame-bypass.js"></script>
  </head>
  <body>
    <iframe
      id="chameleon-game-frame"
      is="x-frame-bypass"
      title="Meccha Chameleon browser game"
      allow="autoplay; fullscreen; gamepad; pointer-lock; encrypted-media; web-share"
      allowfullscreen
      scrolling="no"
      referrerpolicy="no-referrer"
      sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms allow-pointer-lock allow-top-navigation allow-presentation"
    ></iframe>
    <script>
      document
        .getElementById('chameleon-game-frame')
        .load('https://chameleon-game.com/');
    </script>
  </body>
</html>
